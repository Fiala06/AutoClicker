name: Build Windows EXE

on:
  push:
    tags:
      - "v*"            # build + publish a release when you push a version tag
  workflow_dispatch: {}  # or run it manually from the Actions tab

permissions:
  contents: write        # needed to create a Release and upload the exe

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build single-file EXE
        run: pyinstaller --onefile --windowed --name AutoClicker autoclicker.py

      # Always make the exe downloadable from the workflow run (Artifacts).
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-exe
          path: dist/AutoClicker.exe

      # When triggered by a version tag, also publish a GitHub Release with the exe.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AutoClicker.exe
